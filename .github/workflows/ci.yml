name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

permissions: {}

jobs:
  ci:
    uses: luxass/shared-workflows/.github/workflows/ci.yaml@262ac659334b242eb257cb94bc16bc61ae0e1101 # v0.1.0
    with:
      fmt: true
      fmt-script: "fmt:check"
