name: Auto Release

on:
  pull_request:
    types: [closed]
    branches:
      # this will limit the github actions a bit.
      - main

jobs:
  auto-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    environment:
      name: auto-release
      deployment: false
    if: >-
      github.event.pull_request.merged == true &&
        github.event.pull_request.head.ref == 'update-github-languages' &&
        github.repository == 'luxass/github-languages' &&
        github.event.pull_request.user.login == 'luxass'
    steps:
      - name: generate token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # needed by the npx bumpp -r cmd to create a tag
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: setup node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: lts/*

      - name: install dependencies
        run: pnpm install

      - name: build
        run: pnpm run build

      - name: create tag and release
        run: |
          CURRENT_VERSION=$(cat package.json | jq -r '.version')
          PATCH_VERSION=$(echo $CURRENT_VERSION | awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}')

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          npx bumpp $PATCH_VERSION --commit --tag --push --yes
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
